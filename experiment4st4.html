<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS&Javacript example</title>
    <link rel="stylesheet" href="experiment4st4.css">
</head>

<body>
    <h1>WELCOME TO 4CSE3</h1>
    <div class="box">
        <h2>Enter Text</h2>
        <input type="text" id="txt">
        <button onclick="display()">Submit</button>
        <p id="result"></p>
    </div>
    <script>
        function display() {
            var text = document.getElementById("txt").value;
            document.getElementById("result").innerHTML = "you entered: " + text;
        }
    </script>
</body>

</html>
