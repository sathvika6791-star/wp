<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Java Script popup Boxes</title>
        <script>
            function showAlert() {
                alert("This is an alert box!");
                
            }
            function showConfirm() {
                var result = confirm("Do you want to proceed?");
                if (result) {
                    document.getElementById("output").innerHTML = "You pressed OK!";
                } else {
                    document.getElementById("output").innerHTML = "You pressed Cancel!";
                }
            }
            function showPrompt() {
                var name = prompt("Please enter your name:", "Sathvikashivani");
                var age = prompt("Please enter your age:", "19");
                var city = prompt("Please enter your city:", "Warangal");
                if (name != null) {
                    document.getElementById("output").innerHTML = "Hello " + name + "!";
                }
                if (age != null) {
                    document.getElementById("output").innerHTML += "<br>Your age is " + age + ".";
                }
                if (city != null) {
                    document.getElementById("output").innerHTML += "<br>You live in " + city + ".";
                }
            }
        </script>
    </head>
    <body>
        <h1>UserDetails</h1>
        <button onclick="showAlert()"> Alert</button>
        <button onclick="showConfirm()"> Confirm</button>
        <button onclick="showPrompt()"> Prompt</button>
        <p id="output"></p>
    </body>
</html>
